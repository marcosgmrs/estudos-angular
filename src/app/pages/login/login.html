<div class="login-container">
  <div class="login-header">
    <span class="login-icone">🔐</span>
    <h2>Bem-vindo de volta</h2>
    <p>Entre com suas credenciais para continuar</p>
  </div>

  <form [formGroup]="formulario" (ngSubmit)="entrar()">
    <div class="campo">
      <label>Digite qualqer email / Email</label>
      <input type="email" formControlName="email" placeholder="seu@email.com">
      @if (email?.invalid && email?.touched) {
        <span class="erro">Digite um email válido</span>
      }
    </div>

    <div class="campo">
      <label>Digite qualquer sequência de 6 caracteres / Senha</label>
      <input type="password" formControlName="senha" placeholder="mínimo 6 caracteres">
      @if (senha?.invalid && senha?.touched) {
        <span class="erro">Senha precisa ter pelo menos 6 caracteres</span>
      }
    </div>

    <button type="submit" class="btn-entrar" [disabled]="formulario.invalid">
      Entrar
    </button>
  </form>
</div>
