<div class="login-container">
  <h2>Login</h2>

  <form [formGroup]="formulario" (ngSubmit)="entrar()">

    <div class="campo">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="seu@email.com">
      @if (email?.invalid && email?.touched) {
        <span class="erro">Email inválido</span>
      }
    </div>

    <div class="campo">
      <label>Senha</label>
      <input type="password" formControlName="senha" placeholder="mínimo 6 caracteres">
      @if (senha?.invalid && senha?.touched) {
        <span class="erro">Senha precisa ter pelo menos 6 caracteres</span>
      }
    </div>

    <button type="submit" [disabled]="formulario.invalid">Entrar</button>

  </form>
</div>
