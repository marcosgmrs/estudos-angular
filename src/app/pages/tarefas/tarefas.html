<h2>Tarefas da API</h2>

@if (carregando()) {
  <p>Carregando tarefas...</p>
} @else if (erro()) {
  <p class="erro">{{ erro() }}</p>
} @else {
  <p>Total: {{ todos().length }} tarefas</p>

  @for (todo of todos(); track todo.id) {
    <div class="todo-item">
      <span>{{ todo.title }}</span>
      @if (todo.completed) {
        <span>✅</span>
      } @else {
        <span>⏳</span>
      }
    </div>
  }
}

<a routerLink="/">Voltar</a>
